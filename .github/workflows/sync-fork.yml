name: Sync Fork
on:
  schedule:
    - cron: '0 9 * * *'  # daily at 9am UTC (2am PT)
  workflow_dispatch:       # allows manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Sync with upstream
        run: |
          git remote add upstream https://github.com/zed-industries/zed.git
          git fetch upstream
          git merge upstream/main --ff-only
          git push origin main

Or even simpler — GitHub can do it with zero config via the API. A one-liner workflow:

name: Sync Fork
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - run: gh repo sync ${{ github.repository }} --branch main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
